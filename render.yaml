services:
  - type: web
    name: dealer-keytrack
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: AIRTABLE_TOKEN
        sync: false
      - key: AIRTABLE_BASE_ID
        sync: false
      - key: AIRTABLE_TABLE
        value: Vehicles
      - key: OPENAI_API_KEY
        sync: false
      - key: ACCESS_PASSWORD
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DEALERSHIP_NAME
        value: Premier Auto Group
      - key: URL_SECRET_TOKEN
        sync: false
