<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dealer Key Tracker — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #F0CB6E;
      --dark: #0A0C10;
      --panel: #10141C;
      --border: rgba(201,168,76,0.25);
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .grid-bg {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .glow-orb {
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%,-50%) scale(1.08); }
    }
    .card {
      position: relative; z-index: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 60px rgba(201,168,76,0.08), 0 24px 48px rgba(0,0,0,0.6);
    }
    .brand { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.1rem; letter-spacing: 0.2em; }
    h1 { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 2rem; line-height: 1; color: #fff; }
    .gold { color: var(--gold); }
    input[type="text"], input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #fff;
      padding: 14px 16px;
      font-size: 1rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.02em;
      margin-bottom: 14px;
    }
    input[type="text"]::placeholder,
    input[type="password"]::placeholder { color: rgba(255,255,255,0.25); letter-spacing: normal; }
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
    }
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
      color: #0A0C10;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: 0.12em;
      padding: 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }
    .error-msg {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #FCA5A5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.875rem;
    }
    .corner { position: absolute; width: 16px; height: 16px; border-color: var(--gold); border-style: solid; opacity: 0.6; }
    .corner-tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
    .corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
    .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
    .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow-orb"></div>

  <div class="card">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- Logo -->
    <div class="flex items-center gap-3 mb-8">
      <div style="width:36px;height:36px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0A0C10" stroke-width="2.5">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <span class="brand gold">DEALER<span style="color:rgba(255,255,255,0.4)"> / </span>KEYTRACK</span>
    </div>

    <h1 class="mb-1">Staff <span class="gold">Login</span></h1>
    <p style="color:rgba(255,255,255,0.4);font-size:0.875rem;margin-bottom:32px;">Authorized dealership personnel only.</p>

    {% if error %}
    <div class="error-msg mb-5">🔒 {{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
      <div style="margin-bottom:6px;">
        <label style="display:block;color:rgba(255,255,255,0.45);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:7px;">Username</label>
        <input type="text" name="username" placeholder="e.g. staff or admin" autocomplete="username" autofocus tabindex="1"/>
      </div>
      <div style="margin-bottom:20px;">
        <label style="display:block;color:rgba(255,255,255,0.45);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:7px;">Password</label>
        <input type="password" name="password" placeholder="Enter your password" autocomplete="current-password" tabindex="2"/>
      </div>
      <button type="submit" class="btn-primary mt-2" tabindex="3">UNLOCK ACCESS</button>
    </form>

    <p style="text-align:center;color:rgba(255,255,255,0.2);font-size:0.75rem;margin-top:28px;letter-spacing:0.05em;">
      SECURED — DEALERSHIP USE ONLY
    </p>
  </div>
</body>
</html>
