<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Platform Admin Login — KeyTrack</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--gold:#C9A84C;--gold-light:#F0CB6E;--dark:#0A0C10;--panel:#10141C;--border:rgba(201,168,76,.2);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--dark);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:36px 32px;width:100%;max-width:360px;}
    .logo{text-align:center;margin-bottom:28px;}
    .brand{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.18em;color:var(--gold);}
    h1{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;text-align:center;margin-bottom:6px;}
    .sub{text-align:center;color:rgba(255,255,255,.3);font-size:.82rem;margin-bottom:22px;}
    .field{margin-bottom:13px;}
    label{font-size:.72rem;color:rgba(255,255,255,.4);letter-spacing:.08em;display:block;margin-bottom:5px;}
    input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 13px;color:#fff;font-size:.9rem;font-family:'DM Sans',sans-serif;}
    input:focus{outline:none;border-color:var(--gold);}
    input::placeholder{color:rgba(255,255,255,.25);}
    .btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0A0C10;border:none;border-radius:10px;padding:12px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.88rem;letter-spacing:.1em;cursor:pointer;margin-top:6px;}
    .btn:hover{opacity:.85;}
    .err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#FCA5A5;border-radius:8px;padding:9px 13px;font-size:.8rem;margin-bottom:13px;display:none;}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div style="width:44px;height:44px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0A0C10" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <div class="brand">KEYTRACK PLATFORM</div>
  </div>
  <h1>Platform Admin</h1>
  <p class="sub">Manage all dealers and plans</p>
  <div class="err" id="err"></div>
  <div class="field"><label>Admin Email</label><input id="email" type="email" placeholder="platform@keytrack.com.au"></div>
  <div class="field"><label>Password</label><input id="password" type="password" placeholder="Admin password"></div>
  <button class="btn" onclick="login()">SIGN IN</button>
</div>
<script>
async function login(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const err=document.getElementById('err'); err.style.display='none';
  const r=await fetch('/platform/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
  const d=await r.json();
  if(d.ok) location.href=d.redirect||'/platform/admin';
  else{err.textContent=d.message;err.style.display='block';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')login();});
</script>
</body>
</html>
